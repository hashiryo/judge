name: judge

on:
  push:
    branches:
      - main
    paths:
      - "problems/**"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: judge-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      has-problems: ${{ steps.detect.outputs.has-problems }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed problems
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python3 scripts/detect-changed.py --all
          else
            python3 scripts/detect-changed.py \
              --before "${{ github.event.before }}" \
              --after "${{ github.sha }}"
          fi

  download:
    needs: detect
    if: needs.detect.outputs.has-problems == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore testcase cache
        uses: actions/cache/restore@v4
        with:
          path: .cache/testcases
          key: testcases-v1
          restore-keys: testcases-

      - name: Restore library-checker-problems
        uses: actions/cache/restore@v4
        with:
          path: .cache/library-checker-problems
          key: library-checker-v1

      - name: Download testcases
        env:
          YUKICODER_TOKEN: ${{ secrets.YUKICODER_TOKEN }}
        run: |
          python3 scripts/download-testcases.py \
            --problems-json '${{ needs.detect.outputs.matrix }}'

      - name: Save testcase cache
        uses: actions/cache/save@v4
        with:
          path: .cache/testcases
          key: testcases-v1
        continue-on-error: true

      - name: Save library-checker-problems cache
        uses: actions/cache/save@v4
        with:
          path: .cache/library-checker-problems
          key: library-checker-v1
        continue-on-error: true

      - name: Upload testcases
        uses: actions/upload-artifact@v4
        with:
          name: testcases
          path: |
            .cache/testcases
            .cache/custom-testcases
          retention-days: 1
          compression-level: 1

  run:
    needs: [detect, download]
    if: needs.detect.outputs.has-problems == 'true'
    strategy:
      fail-fast: false
      matrix:
        env:
          - {
              os: ubuntu-24.04,
              toolchain: gcc,
              cxx: g++-15,
              name: x64-g++,
              cxxflags: "-std=gnu++23 -Wall -Wextra -O2 -march=x86-64-v3 -flto=auto -ftrivial-auto-var-init=zero -pthread",
            }
          - {
              os: ubuntu-24.04,
              toolchain: clang,
              cxx: clang++-21,
              name: x64-clang++,
              cxxflags: "-std=gnu++23 -Wall -Wextra -O2 -march=x86-64-v3 -flto=auto -ftrivial-auto-var-init=zero -pthread -fuse-ld=lld -fconstexpr-depth=1024",
            }
          - {
              os: ubuntu-24.04-arm,
              toolchain: gcc,
              cxx: g++-15,
              name: arm-g++,
              cxxflags: "-std=gnu++23 -Wall -Wextra -O2 -march=armv8.2-a -flto=auto -ftrivial-auto-var-init=zero -pthread -DUSE_SIMDE -DSIMDE_ENABLE_NATIVE_ALIASES -Ilib/include/simde",
            }
          - {
              os: ubuntu-24.04-arm,
              toolchain: clang,
              cxx: clang++-21,
              name: arm-clang++,
              cxxflags: "-std=gnu++23 -Wall -Wextra -O2 -march=armv8.2-a -flto=auto -ftrivial-auto-var-init=zero -pthread -fuse-ld=lld -fconstexpr-depth=1024 -DUSE_SIMDE -DSIMDE_ENABLE_NATIVE_ALIASES -Ilib/include/simde",
            }
    runs-on: ${{ matrix.env.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install compiler
        run: |
          set -eux
          sudo apt-get update
          if [[ "${{ matrix.env.toolchain }}" == "gcc" ]]; then
            sudo apt-get install -y software-properties-common
            sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
            sudo apt-get update
            sudo apt-get install -y g++-15
          else
            sudo apt-get install -y wget lsb-release software-properties-common gnupg
            wget -qO /tmp/llvm.sh https://apt.llvm.org/llvm.sh
            sudo bash /tmp/llvm.sh 21 all
            sudo ln -sf /usr/bin/ld.lld-21 /usr/local/bin/ld.lld
          fi

      - name: Diagnose perf availability
        run: |
          echo "::group::perf_event_paranoid"
          cat /proc/sys/kernel/perf_event_paranoid || true
          echo "::endgroup::"

          echo "::group::Install perf"
          sudo apt-get install -y linux-tools-common "linux-tools-$(uname -r)" 2>/dev/null \
            || sudo apt-get install -y linux-tools-generic || true
          which perf || true
          perf --version || true
          echo "::endgroup::"

          echo "::group::try lowering perf_event_paranoid"
          sudo sysctl -w kernel.perf_event_paranoid=1 2>&1 || true
          cat /proc/sys/kernel/perf_event_paranoid || true
          echo "::endgroup::"

          echo "::group::perf stat as current user (after sysctl)"
          perf stat -e cycles,instructions -- /bin/true 2>&1 || true
          perf stat -x, -e cycles,instructions,cache-misses,branch-misses -- /bin/true 2>&1 || true
          echo "::endgroup::"

          echo "::group::perf stat via sudo (fallback)"
          sudo perf stat -e cycles,instructions -- /bin/true 2>&1 || true
          sudo perf stat -x, -e cycles,instructions,cache-misses,branch-misses -- /bin/true 2>&1 || true
          echo "::endgroup::"

      - name: Record runner CPU
        run: |
          echo "::group::CPU info"
          cpu_model=$(lscpu 2>/dev/null | awk -F': +' '/^Model name/{print $2; exit}')
          if [[ -z "${cpu_model}" ]]; then
            cpu_model=$(grep -m1 'model name' /proc/cpuinfo 2>/dev/null | sed 's/.*: //')
          fi
          [[ -z "${cpu_model}" ]] && cpu_model=$(uname -m)
          cpu_arch=$(uname -m)
          compiler_version=$(${{ matrix.env.cxx }} --version 2>/dev/null | head -1 || echo "")
          echo "cpu_model=${cpu_model}"
          echo "cpu_arch=${cpu_arch}"
          echo "compiler_version=${compiler_version}"
          {
            echo "RUNNER_CPU_MODEL=${cpu_model}"
            echo "RUNNER_CPU_ARCH=${cpu_arch}"
            echo "COMPILER_VERSION=${compiler_version}"
          } >> "$GITHUB_ENV"
          echo "::endgroup::"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download testcases
        uses: actions/download-artifact@v4
        with:
          name: testcases
          path: .cache

      - name: Run tests
        env:
          CXX: ${{ matrix.env.cxx }}
          CXXFLAGS: ${{ matrix.env.cxxflags }}
          ENV_NAME: ${{ matrix.env.name }}
          PROBLEMS_JSON: ${{ needs.detect.outputs.matrix }}
          RUNNER_CPU_MODEL: ${{ env.RUNNER_CPU_MODEL }}
          RUNNER_CPU_ARCH: ${{ env.RUNNER_CPU_ARCH }}
          COMPILER_VERSION: ${{ env.COMPILER_VERSION }}
        run: bash scripts/run-tests.sh

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ matrix.env.name }}
          path: .cache/results/
          retention-days: 7

      - name: Upload error logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.env.name }}
          path: .cache/logs/${{ matrix.env.name }}/
          retention-days: 30
          if-no-files-found: ignore

  collect:
    needs: [detect, run]
    if: "!cancelled()"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download all results
        if: needs.detect.outputs.has-problems == 'true'
        uses: actions/download-artifact@v4
        with:
          pattern: result-*
          path: .cache/results/
          merge-multiple: true

      - name: Collect results
        if: needs.detect.outputs.has-problems == 'true'
        run: python3 scripts/collect-results.py

      - name: Write summary
        if: needs.detect.outputs.has-problems == 'true'
        run: python3 scripts/write-summary.py >> "$GITHUB_STEP_SUMMARY" || true

      - name: Commit history
        if: github.ref == 'refs/heads/main' && needs.detect.outputs.has-problems == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .results/history.jsonl
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "[skip ci] Update judge results"
            git pull --rebase origin main || true
            git push
          fi

      - name: Prepare Pages
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p _site
          cp docs/index.html _site/
          cp .results/history.jsonl _site/ 2>/dev/null || true

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: "!cancelled() && github.ref == 'refs/heads/main' && needs.collect.result == 'success'"
    needs: collect
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
