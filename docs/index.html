<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Judge Dashboard</title>
    <style>
      :root {
        --bg: #0d1117;
        --bg2: #161b22;
        --border: #30363d;
        --text: #e6edf3;
        --text2: #8b949e;
        --green: #3fb950;
        --red: #f85149;
        --yellow: #d29922;
        --blue: #58a6ff;
        --purple: #bc8cff;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial,
          sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
        padding: 20px;
        max-width: 1400px;
        margin: 0 auto;
      }
      h1 {
        font-size: 1.5em;
        margin-bottom: 8px;
      }
      h2 {
        font-size: 1.2em;
        margin: 24px 0 12px;
        color: var(--blue);
      }
      h3 {
        font-size: 1em;
        margin: 16px 0 8px;
        color: var(--text2);
      }
      a {
        color: var(--blue);
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      .subtitle {
        color: var(--text2);
        font-size: 0.9em;
        margin-bottom: 20px;
      }

      /* Tabs */
      .tabs {
        display: flex;
        gap: 4px;
        margin-bottom: 16px;
        border-bottom: 1px solid var(--border);
      }
      .tab {
        padding: 8px 16px;
        cursor: pointer;
        border: 1px solid transparent;
        border-bottom: none;
        border-radius: 6px 6px 0 0;
        color: var(--text2);
        background: transparent;
        font-size: 0.9em;
      }
      .tab:hover {
        color: var(--text);
      }
      .tab.active {
        color: var(--text);
        background: var(--bg2);
        border-color: var(--border);
      }
      .tab-content {
        display: none;
      }
      .tab-content.active {
        display: block;
      }

      /* Tables */
      table {
        border-collapse: collapse;
        width: 100%;
        margin-bottom: 16px;
      }
      th,
      td {
        padding: 6px 12px;
        border: 1px solid var(--border);
        text-align: center;
        font-size: 0.85em;
      }
      th {
        background: var(--bg2);
        color: var(--text2);
        font-weight: 600;
      }
      td:first-child,
      th:first-child {
        text-align: left;
      }
      tr:hover td {
        background: rgba(88, 166, 255, 0.05);
      }
      .env-group-start {
        border-left: 2px solid var(--border);
      }

      /* Runtime environments セクション */
      .runtime-envs {
        margin: 12px 0 20px;
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 8px 12px;
      }
      .runtime-envs > summary {
        cursor: pointer;
        color: var(--text2);
        font-size: 0.9em;
        padding: 4px 0;
      }
      .runtime-envs > summary:hover {
        color: var(--text);
      }
      .envs-table {
        margin-top: 8px;
        font-size: 0.8em;
      }
      .envs-table td,
      .envs-table th {
        padding: 4px 8px;
        text-align: left;
      }
      .envs-table .cxxflags {
        font-family: monospace;
        color: var(--text2);
        max-width: 600px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        cursor: help;
      }

      /* Metric トグル */
      .metric-toggle {
        display: flex;
        gap: 4px;
        margin: 12px 0;
        align-items: center;
        font-size: 0.9em;
      }
      .metric-toggle label {
        color: var(--text2);
        margin-right: 4px;
      }
      .metric-toggle button {
        padding: 4px 12px;
        background: var(--bg2);
        color: var(--text2);
        border: 1px solid var(--border);
        border-radius: 4px;
        cursor: pointer;
        font-size: 0.9em;
      }
      .metric-toggle button:hover {
        color: var(--text);
      }
      .metric-toggle button.active {
        background: var(--blue);
        color: white;
        border-color: var(--blue);
      }
      .sort-hint {
        color: var(--text2);
        font-size: 0.75em;
        margin-left: 4px;
      }

      .status-ac {
        color: var(--green);
        font-weight: 600;
      }
      .status-wa {
        color: var(--red);
        font-weight: 600;
      }
      .status-tle {
        color: var(--yellow);
        font-weight: 600;
      }
      .status-re {
        color: var(--red);
        font-weight: 600;
      }
      .status-ce {
        color: var(--text2);
        font-weight: 600;
      }
      .status-mle {
        color: var(--purple);
        font-weight: 600;
      }
      .diff-better {
        color: var(--green);
      }
      .diff-worse {
        color: var(--red);
      }
      .diff-same {
        color: var(--text2);
      }
      .diff-muted {
        color: var(--text2);
        font-size: 0.85em;
      }

      /* Problem cards */
      .problem-card {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 16px;
        margin-bottom: 12px;
        cursor: pointer;
      }
      .problem-card:hover {
        border-color: var(--blue);
      }
      .problem-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .problem-name {
        font-weight: 600;
        font-size: 1em;
      }
      .problem-meta {
        color: var(--text2);
        font-size: 0.85em;
      }
      .problem-files {
        color: var(--text2);
        font-size: 0.85em;
        margin-top: 4px;
      }
      .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 12px;
        font-size: 0.8em;
        font-weight: 600;
      }
      .badge-ac {
        background: rgba(63, 185, 80, 0.2);
        color: var(--green);
      }
      .badge-fail {
        background: rgba(248, 81, 73, 0.2);
        color: var(--red);
      }

      /* History chart (simple bar) */
      .chart-container {
        margin: 12px 0;
      }
      .chart-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 3px 0;
        font-size: 0.8em;
      }
      .chart-label {
        width: 80px;
        text-align: right;
        color: var(--text2);
        flex-shrink: 0;
      }
      .chart-bar-bg {
        flex: 1;
        height: 18px;
        background: var(--bg);
        border-radius: 3px;
        position: relative;
        overflow: hidden;
      }
      .chart-bar {
        height: 100%;
        border-radius: 3px;
        display: flex;
        align-items: center;
        padding-left: 6px;
        font-size: 0.75em;
        color: var(--text);
        min-width: 1px;
      }
      .chart-bar.ac {
        background: rgba(63, 185, 80, 0.5);
      }
      .chart-bar.fail {
        background: rgba(248, 81, 73, 0.5);
      }

      /* Filters */
      .filters {
        margin-bottom: 16px;
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
      }
      select,
      input {
        background: var(--bg2);
        color: var(--text);
        border: 1px solid var(--border);
        padding: 6px 10px;
        border-radius: 6px;
        font-size: 0.85em;
      }
      label {
        font-size: 0.85em;
        color: var(--text2);
      }

      .loading {
        text-align: center;
        padding: 40px;
        color: var(--text2);
      }
      .error {
        text-align: center;
        padding: 40px;
        color: var(--red);
      }
    </style>
  </head>
  <body>
    <h1>Judge Dashboard</h1>
    <p class="subtitle" id="subtitle">Loading...</p>
    <div class="filters" id="global-filters" style="display:none">
      <label><input type="checkbox" id="show-archived" /> Show archived problems</label>
    </div>

    <div class="tabs">
      <div class="tab active" data-tab="overview">Overview</div>
      <div class="tab" data-tab="history">History</div>
      <div class="tab" data-tab="detail">Detail</div>
    </div>

    <!-- Overview tab -->
    <div id="overview" class="tab-content active">
      <div id="overview-runtime-envs"></div>
      <div class="filters">
        <label><input type="checkbox" id="overview-ac-only" /> AC only</label>
      </div>
      <div id="problem-list"></div>
    </div>

    <!-- History tab -->
    <div id="history" class="tab-content">
      <div class="filters">
        <label
          >Problem:
          <select id="history-problem"></select
        ></label>
        <label
          >File:
          <select id="history-file"></select
        ></label>
        <label
          >Env:
          <select id="history-env"></select
        ></label>
        <label><input type="checkbox" id="history-ac-only" /> AC only</label>
      </div>
      <div id="history-chart"></div>
      <div id="history-table-container"></div>
    </div>

    <!-- Detail tab -->
    <div id="detail" class="tab-content">
      <div class="filters">
        <label
          >Problem:
          <select id="detail-problem"></select
        ></label>
        <label
          >Push:
          <select id="detail-push"></select
        ></label>
      </div>
      <div id="detail-runtime-envs"></div>
      <div class="metric-toggle">
        <label>Metric:</label>
        <button data-metric="time_max" class="active">time_max</button>
        <button data-metric="time_total">time_total</button>
        <button data-metric="algo_time_max">algo_time_max</button>
        <button data-metric="memory_max">memory_max</button>
        <button data-metric="Ir">Ir</button>
        <button data-metric="D1_miss">D1_miss</button>
        <button data-metric="LL_miss">LL_miss</button>
        <button data-metric="branch_miss">branch_miss</button>
        <button data-metric="SIMD_ratio">SIMD%</button>
        <span id="detail-sort-hint" class="sort-hint"></span>
      </div>
      <div id="detail-content"></div>
    </div>

    <script>
      const ENVS = ["x64-g++", "x64-clang++", "arm-g++", "arm-clang++"];
      let allEntries = [];
      // Detail タブの Summary テーブルのソート状態
      // 表示中メトリクスとは独立 (切替時に並び順は凍結される)
      let detailSortEnv = null; // null = File 名順
      let detailSortMetric = "time_max"; // ソートに使ったメトリクス
      let detailSortDir = "asc"; // "asc" | "desc"
      // 表示中メトリクス (Summary テーブルの Value 列に表示)
      let detailDisplayMetric = "time_max";

      // ============================================================
      // Data loading
      // ============================================================
      async function loadData() {
        try {
          const resp = await fetch("history.jsonl");
          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
          const text = await resp.text();
          allEntries = text
            .trim()
            .split("\n")
            .filter((l) => l)
            .map((l) => JSON.parse(l));
          if (allEntries.length === 0) throw new Error("No data");
          document.getElementById("subtitle").textContent =
            `${allEntries.length} push(es) recorded`;
          // active_problems が記録されているエントリがある場合のみトグル表示
          if (getActiveProblems() !== null) {
            document.getElementById("global-filters").style.display = "";
            document.getElementById("show-archived").onchange = (e) => {
              showArchived = e.target.checked;
              populateHistoryFilters();
              populateDetailFilters();
            };
          }
          renderOverview();
          document.getElementById("overview-ac-only").onchange = renderOverview;
          populateHistoryFilters();
          populateDetailFilters();
        } catch (e) {
          document.getElementById("subtitle").textContent = "";
          document.getElementById("problem-list").innerHTML =
            `<div class="error">Failed to load history.jsonl: ${e.message}</div>`;
        }
      }

      // ============================================================
      // Helpers
      // ============================================================
      function getProblems(entry) {
        const problems = new Map();
        for (const r of entry.results) {
          const key = getProblemDir(r.file);
          if (!problems.has(key)) problems.set(key, []);
          problems.get(key).push(r);
        }
        return problems;
      }

      function getAllProblems() {
        const problems = new Set();
        for (const entry of allEntries) {
          for (const r of entry.results) {
            problems.add(getProblemDir(r.file));
          }
        }
        return [...problems].sort();
      }

      // 最新 push 時点でアクティブな問題ディレクトリ一覧を返す。
      // active_problems が記録されていない古いエントリのみの場合は null。
      function getActiveProblems() {
        for (let i = allEntries.length - 1; i >= 0; i--) {
          const ap = allEntries[i].active_problems;
          if (Array.isArray(ap)) return new Set(ap);
        }
        return null;
      }

      // アーカイブ表示トグルの状態 (UI 初期値は false)
      let showArchived = false;

      function getVisibleProblems() {
        const all = getAllProblems();
        if (showArchived) return all;
        const active = getActiveProblems();
        if (active === null) return all;
        return all.filter((p) => active.has(p));
      }

      function getAllFiles() {
        const files = new Set();
        for (const entry of allEntries) {
          for (const r of entry.results) files.add(r.file);
        }
        return [...files].sort();
      }

      function statusClass(status) {
        return "status-" + (status || "ce").toLowerCase();
      }

      function formatTime(ms) {
        if (ms === undefined || ms === null) return "-";
        return ms >= 1000 ? (ms / 1000).toFixed(2) + "s" : ms + "ms";
      }

      function formatMemory(kb) {
        if (kb === undefined || kb === null) return "-";
        return kb >= 1024 ? (kb / 1024).toFixed(1) + "MB" : kb + "KB";
      }

      // Ir (instructions) のコンパクト表示: 1.91G / 234M / 12.3K など (有効数字 3-4 桁)
      function formatIr(n) {
        if (n === undefined || n === null) return "-";
        const abs = Math.abs(n);
        if (abs >= 1e9) return (n / 1e9).toFixed(abs >= 1e10 ? 2 : 3) + "G";
        if (abs >= 1e6) return (n / 1e6).toFixed(abs >= 1e7 ? 2 : 3) + "M";
        if (abs >= 1e3) return (n / 1e3).toFixed(abs >= 1e4 ? 2 : 3) + "K";
        return String(n);
      }

      // Ir の生値をカンマ区切りで
      function formatIrRaw(n) {
        if (n === undefined || n === null) return "-";
        return n.toLocaleString();
      }

      // ns → 短縮表示 (123ns / 12.3μs / 12.3ms / 12.3s)
      function formatNs(ns) {
        if (ns === undefined || ns === null) return "-";
        const abs = Math.abs(ns);
        if (abs >= 1e9) return (ns / 1e9).toFixed(2) + "s";
        if (abs >= 1e6) return (ns / 1e6).toFixed(2) + "ms";
        if (abs >= 1e3) return (ns / 1e3).toFixed(2) + "μs";
        return ns + "ns";
      }
      function formatNsRaw(ns) {
        if (ns === undefined || ns === null) return "-";
        return ns.toLocaleString() + " ns";
      }

      // メトリクス定義
      const METRICS = {
        time_max: {
          label: "time_max",
          field: "time_max_ms",
          format: formatTime,
          formatRaw: (v) => (v === undefined || v === null ? "-" : v.toLocaleString() + " ms"),
          unit: "ms",
        },
        time_total: {
          label: "time_total",
          field: "time_total_ms",
          format: formatTime,
          formatRaw: (v) => (v === undefined || v === null ? "-" : v.toLocaleString() + " ms"),
          unit: "ms",
        },
        algo_time_max: {
          label: "algo_time_max",
          field: "algo_time_max_ns",
          format: formatNs,
          formatRaw: formatNsRaw,
          unit: "ns",
        },
        memory_max: {
          label: "memory_max",
          field: "memory_max_kb",
          format: formatMemory,
          formatRaw: (v) => (v === undefined || v === null ? "-" : v.toLocaleString() + " KB"),
          unit: "KB",
        },
        Ir: {
          label: "Ir",
          field: "callgrind_instructions",
          format: formatIr,
          formatRaw: formatIrRaw,
          unit: "",
        },
        D1_miss: {
          label: "D1_miss",
          field: "callgrind_d1_misses",
          format: formatIr,
          formatRaw: formatIrRaw,
          unit: "",
        },
        LL_miss: {
          label: "LL_miss",
          field: "callgrind_ll_misses",
          format: formatIr,
          formatRaw: formatIrRaw,
          unit: "",
        },
        branch_miss: {
          label: "branch_miss",
          field: "callgrind_branch_misses",
          format: formatIr,
          formatRaw: formatIrRaw,
          unit: "",
        },
        SIMD_ratio: {
          label: "SIMD%",
          field: "callgrind_simd_ratio",
          // ratio (0..1) → "12.3%"。0 に近いと "0.01%"、大きいと "23.4%"
          format: (v) => {
            if (v === undefined || v === null) return "-";
            const pct = v * 100;
            return (pct >= 10 ? pct.toFixed(1) : pct.toFixed(2)) + "%";
          },
          formatRaw: (v) =>
            v === undefined || v === null ? "-" : (v * 100).toFixed(4) + "%",
          unit: "%",
          higherIsBetter: true,
        },
      };

      // 全メトリクスを見やすくまとめたツールチップ文字列 (best 比付き)
      function buildMetricTooltip(entry, bestsForEnv) {
        if (!entry) return "";
        const lines = [];
        for (const [key, m] of Object.entries(METRICS)) {
          const v = entry[m.field];
          const best = bestsForEnv ? bestsForEnv[key] : null;
          let line = `${m.label}: ${m.formatRaw(v)}`;
          if (typeof v === "number" && typeof best === "number" && best !== null) {
            if (v === best) line += " (best)";
            else {
              const d = v - best;
              const sign = d >= 0 ? "+" : "-";
              line += ` (${sign}${m.formatRaw(Math.abs(d))})`;
            }
          }
          lines.push(line);
        }
        if (entry.callgrind_case) {
          lines.push(`callgrind_case: ${entry.callgrind_case}`);
        }
        if (entry.cases && entry.cases.length > 0) {
          lines.push(`cases: ${entry.cases.length}`);
        }
        if (entry.detail) lines.push(`detail: ${entry.detail}`);
        return lines.join("\n");
      }

      // Runtime environments セクションの HTML を組み立てる (entry 引数はその push の entry)
      function renderRuntimeEnvs(entry) {
        if (!entry) return "";
        // entry.results のうち各 env で最初に見つかったものから環境情報を取得
        const byEnv = {};
        for (const r of entry.results || []) {
          const env = r.environment;
          if (!env || byEnv[env]) continue;
          byEnv[env] = r;
        }
        const rows = ENVS.map((env) => {
          const r = byEnv[env];
          if (!r) {
            return `<tr><th>${env}</th><td colspan="3" style="color:var(--text2)">-</td></tr>`;
          }
          return `<tr>
            <th>${env}</th>
            <td>${escapeAttr(r.cpu_model || "-")}</td>
            <td>${escapeAttr(r.compiler_version || "-")}</td>
            <td class="cxxflags" title="${escapeAttr(r.cxxflags || "")}">${escapeAttr(r.cxxflags || "-")}</td>
          </tr>`;
        }).join("");
        return `
          <details class="runtime-envs" open>
            <summary>Runtime environments</summary>
            <table class="envs-table">
              <thead><tr><th>Env</th><th>CPU</th><th>Compiler</th><th>Flags</th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </details>
        `;
      }

      function formatDate(ts) {
        const d = new Date(ts);
        return (
          d.toLocaleDateString("ja-JP", { month: "numeric", day: "numeric" }) +
          " " +
          d.toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" })
        );
      }

      function escapeAttr(text) {
        return String(text ?? "")
          .replace(/&/g, "&amp;")
          .replace(/"/g, "&quot;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function tooltipAttr(detail) {
        if (!detail) return "";
        return ` title="${escapeAttr(detail)}" style="cursor:help"`;
      }

      function getProblemDir(filePath) {
        const parts = String(filePath || "").split("/");
        if (parts.length <= 1) return String(filePath || "");
        let dir = parts.slice(0, -1).join("/");
        // harness 形式: 末尾の /algos を切り落として親問題ディレクトリに正規化
        if (dir.endsWith("/algos")) dir = dir.slice(0, -"/algos".length);
        return dir;
      }

      function getFilePathWithinProblem(filePath, problemDir) {
        if (!filePath || !problemDir) return String(filePath || "");
        const prefix = problemDir + "/";
        return filePath.startsWith(prefix)
          ? filePath.slice(prefix.length)
          : String(filePath || "");
      }

      // ============================================================
      // Overview tab
      // ============================================================
      function renderOverview() {
        const latest = allEntries[allEntries.length - 1];
        document.getElementById("overview-runtime-envs").innerHTML =
          renderRuntimeEnvs(latest);
        const problems = getProblems(latest);
        const container = document.getElementById("problem-list");
        container.innerHTML = "";
        const acOnly = document.getElementById("overview-ac-only").checked;

        for (const [problemDir, results] of [...problems.entries()].sort()) {
          const allAc = results.every((r) => r.status === "AC");
          if (acOnly && !allAc) continue;

          const files = [
            ...new Set(
              results.map((r) => getFilePathWithinProblem(r.file, problemDir)),
            ),
          ].sort();

          const filteredFiles = acOnly
            ? files.filter((f) => {
                const fullPath = `${problemDir}/${f}`;
                return ENVS.every((env) => {
                  const r = results.find(
                    (x) => x.file === fullPath && x.environment === env,
                  );
                  return r && r.status === "AC";
                });
              })
            : files;
          if (acOnly && filteredFiles.length === 0) continue;

          // 環境ごとに AC の最速時間を計算
          const bestByEnv = {};
          for (const env of ENVS) {
            let best = null;
            for (const f of filteredFiles) {
              const fullPath = `${problemDir}/${f}`;
              const r = results.find(
                (x) => x.file === fullPath && x.environment === env,
              );
              if (r && r.status === "AC" && typeof r.time_max_ms === "number") {
                if (best === null || r.time_max_ms < best) best = r.time_max_ms;
              }
            }
            bestByEnv[env] = best;
          }

          const card = document.createElement("div");
          card.className = "problem-card";
          card.onclick = () => showProblemDetail(problemDir);

          card.innerHTML = `
      <div class="problem-header">
        <span class="problem-name">${problemDir}</span>
        <span class="badge ${allAc ? "badge-ac" : "badge-fail"}">${allAc ? "All AC" : "FAIL"}</span>
      </div>
      <div class="problem-files">${filteredFiles.join(", ")}</div>
      <table style="margin-top:10px">
        <tr><th>File</th>${ENVS.map((e) => `<th>${e}</th>`).join("")}</tr>
        ${filteredFiles
          .map((f) => {
            const row = ENVS.map((env) => {
              const fullPath = `${problemDir}/${f}`;
              let r = results.find(
                (x) => x.file === fullPath && x.environment === env,
              );
              if (!r)
                r = results.find(
                  (x) =>
                    x.file === fullPath && !x.environment && x.status === "CE",
                );
              if (!r) return "<td>-</td>";
              if (r.status === "CE") {
                const tip = tooltipAttr(r.compile_error || r.detail);
                return `<td${tip}><span class="${statusClass(r.status)}">${r.status}</span></td>`;
              }
              const tip = tooltipAttr(r.detail);
              const best = bestByEnv[env];
              let suffix = "";
              if (r.status === "AC" && best !== null && typeof r.time_max_ms === "number") {
                if (r.time_max_ms === best) {
                  suffix = ' <span class="diff-better">★</span>';
                } else {
                  const d = r.time_max_ms - best;
                  suffix = ` <span class="diff-muted">(+${d}ms)</span>`;
                }
              }
              return `<td${tip}><span class="${statusClass(r.status)}">${r.status}</span> ${formatTime(r.time_max_ms)}${suffix}</td>`;
            }).join("");
            return `<tr><td>${f}</td>${row}</tr>`;
          })
          .join("")}
      </table>
    `;
          container.appendChild(card);
        }
      }

      function showProblemDetail(problemDir) {
        // Switch to detail tab and select the problem
        switchTab("detail");
        const sel = document.getElementById("detail-problem");
        sel.value = problemDir;
        detailSortEnv = null;
        detailSortMetric = detailDisplayMetric;
        detailSortDir = "asc";
        updateDetailPushes();
        renderDetail();
      }

      // ============================================================
      // History tab
      // ============================================================
      function populateHistoryFilters() {
        const problems = getVisibleProblems();
        const problemSel = document.getElementById("history-problem");
        problemSel.innerHTML = problems
          .map((p) => `<option value="${p}">${p}</option>`)
          .join("");

        const envSel = document.getElementById("history-env");
        envSel.innerHTML = ENVS.map(
          (e) => `<option value="${e}">${e}</option>`,
        ).join("");

        updateHistoryFiles();
        problemSel.onchange = () => {
          updateHistoryFiles();
          renderHistory();
        };
        document.getElementById("history-file").onchange = renderHistory;
        envSel.onchange = renderHistory;
        document.getElementById("history-ac-only").onchange = renderHistory;
        renderHistory();
      }

      function updateHistoryFiles() {
        const problem = document.getElementById("history-problem").value;
        const files = new Set();
        for (const entry of allEntries) {
          for (const r of entry.results) {
            if (r.file.startsWith(problem + "/")) files.add(r.file);
          }
        }
        const fileSel = document.getElementById("history-file");
        const sorted = [...files].sort();
        fileSel.innerHTML = sorted
          .map(
            (f) =>
              `<option value="${f}">${getFilePathWithinProblem(f, problem)}</option>`,
          )
          .join("");
      }

      function renderHistory() {
        const file = document.getElementById("history-file").value;
        const env = document.getElementById("history-env").value;
        if (!file || !env) return;

        const acOnly = document.getElementById("history-ac-only").checked;

        // Collect history for this file+env
        const history = [];
        for (const entry of allEntries) {
          const r = entry.results.find(
            (x) => x.file === file && x.environment === env,
          );
          if (r) {
            if (acOnly && r.status !== "AC") continue;
            history.push({
              ...r,
              sha_short: entry.sha_short,
              timestamp: entry.timestamp,
              sha: entry.sha,
            });
          }
        }

        // Compute best time per cases_hash group (AC only)
        const bestByHash = {};
        for (const h of history) {
          if (h.status !== "AC" || !h.cases_hash || !h.time_max_ms) continue;
          if (!(h.cases_hash in bestByHash) || h.time_max_ms < bestByHash[h.cases_hash]) {
            bestByHash[h.cases_hash] = h.time_max_ms;
          }
        }

        // Chart
        const maxTime = Math.max(...history.map((h) => h.time_max_ms || 0), 1);
        const chartHtml = history
          .map((h) => {
            const pct = (((h.time_max_ms || 0) / maxTime) * 100).toFixed(1);
            const isBest = h.status === "AC" && h.cases_hash && h.time_max_ms === bestByHash[h.cases_hash];
            const cls = h.status === "AC" ? "ac" : "fail";
            return `<div class="chart-row">
      <span class="chart-label">${h.sha_short}</span>
      <div class="chart-bar-bg">
        <div class="chart-bar ${cls}" style="width:${pct}%">${formatTime(h.time_max_ms)}${isBest ? " ★" : ""}</div>
      </div>
    </div>`;
          })
          .join("");
        document.getElementById("history-chart").innerHTML =
          `<div class="chart-container">${chartHtml}</div>`;

        // Table
        let tableHtml = `<table>
    <tr><th>Push</th><th>Date</th><th>Status</th><th>Max Time</th><th>Max Memory</th><th>vs Prev</th><th>Best</th></tr>`;
        for (let i = 0; i < history.length; i++) {
          const h = history[i];
          let diff = "-";
          if (i > 0) {
            const prev = history[i - 1];
            const bothHaveHash = h.cases_hash && prev.cases_hash;
            if (bothHaveHash && h.cases_hash !== prev.cases_hash) {
              diff = '<span class="diff-same" title="テストケースが変更されました">cases changed</span>';
            } else if (!bothHaveHash) {
              diff = '<span class="diff-same" title="cases_hash が不明のため比較不可">-</span>';
            } else {
              const d = (h.time_max_ms || 0) - (prev.time_max_ms || 0);
              if (Math.abs(d) < 3) diff = '<span class="diff-same">=</span>';
              else if (d > 0) diff = `<span class="diff-worse">+${d}ms</span>`;
              else diff = `<span class="diff-better">${d}ms</span>`;
            }
          }
          const isBest = h.status === "AC" && h.cases_hash && h.time_max_ms === bestByHash[h.cases_hash];
          const bestCell = isBest
            ? '<span class="diff-better">★ best</span>'
            : (h.cases_hash && bestByHash[h.cases_hash] != null
              ? formatTime(bestByHash[h.cases_hash])
              : "-");
          tableHtml += `<tr>
      <td>${h.sha_short}</td>
      <td>${formatDate(h.timestamp)}</td>
      <td><span class="${statusClass(h.status)}">${h.status}</span></td>
      <td>${formatTime(h.time_max_ms)}</td>
      <td>${formatMemory(h.memory_max_kb)}</td>
      <td>${diff}</td>
      <td>${bestCell}</td>
    </tr>`;
        }
        tableHtml += "</table>";
        document.getElementById("history-table-container").innerHTML =
          tableHtml;
      }

      // ============================================================
      // Detail tab
      // ============================================================
      function populateDetailFilters() {
        const problems = getVisibleProblems();
        const problemSel = document.getElementById("detail-problem");
        problemSel.innerHTML = problems
          .map((p) => `<option value="${p}">${p}</option>`)
          .join("");

        problemSel.onchange = () => {
          detailSortEnv = null;
          detailSortDir = "asc";
          updateDetailPushes();
          renderDetail();
        };
        document.getElementById("detail-push").onchange = renderDetail;

        updateDetailPushes();
        renderDetail();
      }

      function updateDetailPushes() {
        const problemDir = document.getElementById("detail-problem").value;
        const pushSel = document.getElementById("detail-push");
        const options = [];
        for (let i = 0; i < allEntries.length; i++) {
          const e = allEntries[i];
          const hasResults = e.results.some((r) =>
            r.file.startsWith(problemDir + "/"),
          );
          if (hasResults) {
            options.push(
              `<option value="${i}">${e.sha_short} (${formatDate(e.timestamp)})</option>`,
            );
          }
        }
        pushSel.innerHTML = options.reverse().join("");
      }

      function renderDetail() {
        const idx = parseInt(document.getElementById("detail-push").value);
        const problemDir = document.getElementById("detail-problem").value;
        const entry = allEntries[idx];
        if (!entry) return;

        // Runtime envs は選択 push に連動
        document.getElementById("detail-runtime-envs").innerHTML =
          renderRuntimeEnvs(entry);

        const results = entry.results.filter((r) =>
          r.file.startsWith(problemDir + "/"),
        );
        const files = [
          ...new Set(
            results.map((r) => getFilePathWithinProblem(r.file, problemDir)),
          ),
        ].sort();

        const container = document.getElementById("detail-content");

        if (results.length === 0) {
          container.innerHTML =
            '<p style="color:var(--text2)">No results for this problem in this push.</p>';
          return;
        }

        // 環境ごとに 全メトリクスの best (通常は最小、higherIsBetter なら最大) を計算
        // bestByEnv[env][metricKey] = best値 (AC の entry のみ対象)
        const bestByEnv = {};
        for (const env of ENVS) {
          bestByEnv[env] = {};
          for (const [metricKey, metric] of Object.entries(METRICS)) {
            const field = metric.field;
            const higher = !!metric.higherIsBetter;
            let best = null;
            for (const f of files) {
              const fullPath = `${problemDir}/${f}`;
              const r = results.find(
                (x) => x.file === fullPath && x.environment === env,
              );
              if (r && r.status === "AC" && typeof r[field] === "number") {
                if (best === null || (higher ? r[field] > best : r[field] < best)) {
                  best = r[field];
                }
              }
            }
            bestByEnv[env][metricKey] = best;
          }
        }

        const displayMetric = METRICS[detailDisplayMetric];

        // ソート: detailSortEnv が null なら File 名順、
        // それ以外なら (detailSortEnv, detailSortMetric) でソート
        // 並び順は切替時に凍結されるので detailDisplayMetric とは独立
        const sortedFiles = files.slice();
        if (detailSortEnv && METRICS[detailSortMetric]) {
          const sortField = METRICS[detailSortMetric].field;
          sortedFiles.sort((fa, fb) => {
            const ra = results.find(
              (x) => x.file === `${problemDir}/${fa}` && x.environment === detailSortEnv,
            );
            const rb = results.find(
              (x) => x.file === `${problemDir}/${fb}` && x.environment === detailSortEnv,
            );
            const sortable = (r) =>
              r && r.status === "AC" && typeof r[sortField] === "number";
            const sa = sortable(ra);
            const sb = sortable(rb);
            if (sa && !sb) return -1;
            if (!sa && sb) return 1;
            if (!sa && !sb) return fa.localeCompare(fb);
            const diff = ra[sortField] - rb[sortField];
            return detailSortDir === "asc" ? diff : -diff;
          });
        }
        const sortIndicator = (env) => {
          if (detailSortEnv !== env) return "";
          const arrow = detailSortDir === "asc" ? "↑" : "↓";
          // ソートに使ったメトリクスと表示中メトリクスが違えば注記
          if (detailSortMetric !== detailDisplayMetric) {
            return ` <span class="sort-hint">${arrow} by ${METRICS[detailSortMetric].label}</span>`;
          }
          return " " + arrow;
        };

        // Sort hint (トグル側)
        document.getElementById("detail-sort-hint").textContent =
          detailSortEnv && detailSortMetric !== detailDisplayMetric
            ? `(sorted by ${METRICS[detailSortMetric].label} on ${detailSortEnv})`
            : "";

        // Summary table
        let html = `<h3>${entry.sha_short} - ${formatDate(entry.timestamp)}</h3>`;
        html += `<table>`;
        html += `<tr><th rowspan="2">File</th>${ENVS.map((e) => `<th colspan="2" class="env-group-start">${e}</th>`).join("")}</tr>`;
        html += `<tr>${ENVS.map((e) => `<th class="env-group-start">Status</th><th class="detail-sort-value" data-env="${e}" style="cursor:pointer" title="${displayMetric.label} でソート">${displayMetric.label}${sortIndicator(e)}</th>`).join("")}</tr>`;
        for (const f of sortedFiles) {
          const fullPath = `${problemDir}/${f}`;
          html += `<tr><td>${f}</td>`;
          for (const env of ENVS) {
            let r = results.find(
              (x) => x.file === fullPath && x.environment === env,
            );
            if (!r)
              r = results.find(
                (x) =>
                  x.file === fullPath && !x.environment && x.status === "CE",
              );
            if (!r) {
              html += `<td class="env-group-start">-</td><td>-</td>`;
              continue;
            }
            if (r.status === "CE") {
              const tooltip = tooltipAttr(r.compile_error || r.detail);
              html += `<td${tooltip} class="env-group-start"><span class="${statusClass("CE")}">CE</span></td><td>-</td>`;
              continue;
            }
            const best = bestByEnv[env][detailDisplayMetric];
            const v = r[displayMetric.field];
            let valueCell = displayMetric.format(v);
            let suffix = "";
            if (r.status === "AC" && typeof v === "number" && best !== null) {
              if (v === best) {
                suffix = ' <span class="diff-better">★</span>';
              } else {
                // higherIsBetter: v < best → (-diff)、 通常: v > best → (+diff)
                const d = v - best;
                const sign = d >= 0 ? "+" : "-";
                suffix = ` <span class="diff-muted">(${sign}${displayMetric.format(Math.abs(d))})</span>`;
              }
            }
            const fullTip = escapeAttr(buildMetricTooltip(r, bestByEnv[env]));
            html += `<td title="${fullTip}" style="cursor:help" class="env-group-start"><span class="${statusClass(r.status)}">${r.status}</span></td><td title="${fullTip}" style="cursor:help">${valueCell}${suffix}</td>`;
          }
          html += "</tr>";
        }
        html += "</table>";

        // Per-case detail for each file
        for (const f of sortedFiles) {
          const fullPath = `${problemDir}/${f}`;
          html += `<h3>${f} - Per Case</h3>`;
          // Pick one env's cases for case names
          const sample = results.find(
            (x) => x.file === fullPath && x.cases && x.cases.length > 0,
          );
          if (!sample) {
            html += '<p style="color:var(--text2)">No case data</p>';
            continue;
          }

          const caseNames = sample.cases.map((c) => c.name);
          html += `<table>`;
          html += `<tr><th rowspan="2">Case</th>${ENVS.map((e) => `<th colspan="3" class="env-group-start">${e}</th>`).join("")}</tr>`;
          html += `<tr>${ENVS.map(() => `<th class="env-group-start">Status</th><th>Time</th><th>Memory</th>`).join("")}</tr>`;
          for (const cn of caseNames) {
            html += `<tr><td>${cn}</td>`;
            for (const env of ENVS) {
              const r = results.find(
                (x) => x.file === fullPath && x.environment === env,
              );
              const c =
                r && r.cases ? r.cases.find((x) => x.name === cn) : null;
              if (!c) {
                html += `<td class="env-group-start">-</td><td>-</td><td>-</td>`;
                continue;
              }
              html += `<td${tooltipAttr(c.detail)} class="env-group-start"><span class="${statusClass(c.status)}">${c.status}</span></td><td>${formatTime(c.time_ms)}</td><td>${formatMemory(c.memory_kb)}</td>`;
            }
            html += "</tr>";
          }
          html += "</table>";
        }

        container.innerHTML = html;

        // Value 列ヘッダーにソート切り替えのクリックハンドラを付与
        container.querySelectorAll(".detail-sort-value").forEach((th) => {
          th.onclick = () => {
            const env = th.dataset.env;
            if (
              detailSortEnv === env &&
              detailSortMetric === detailDisplayMetric
            ) {
              detailSortDir = detailSortDir === "asc" ? "desc" : "asc";
            } else {
              detailSortEnv = env;
              detailSortMetric = detailDisplayMetric;
              // 初期ソート方向は best 優先 (higherIsBetter なら desc)
              detailSortDir = METRICS[detailDisplayMetric]?.higherIsBetter
                ? "desc"
                : "asc";
            }
            renderDetail();
          };
        });
      }

      // Metric トグルのクリックハンドラ
      document.querySelectorAll(".metric-toggle button[data-metric]").forEach(
        (btn) => {
          btn.onclick = () => {
            const m = btn.dataset.metric;
            if (!METRICS[m]) return;
            detailDisplayMetric = m;
            document
              .querySelectorAll(".metric-toggle button[data-metric]")
              .forEach((b) =>
                b.classList.toggle("active", b.dataset.metric === m),
              );
            renderDetail();
          };
        },
      );

      // ============================================================
      // Tab switching
      // ============================================================
      function switchTab(name) {
        document
          .querySelectorAll(".tab")
          .forEach((t) => t.classList.toggle("active", t.dataset.tab === name));
        document
          .querySelectorAll(".tab-content")
          .forEach((t) => t.classList.toggle("active", t.id === name));
      }
      document
        .querySelectorAll(".tab")
        .forEach((t) => (t.onclick = () => switchTab(t.dataset.tab)));

      // ============================================================
      // Init
      // ============================================================
      loadData();
    </script>
  </body>
</html>
